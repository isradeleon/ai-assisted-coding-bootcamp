<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tic Tac Toe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="tic-tac-toe-v2.css">
</head>
<body>

    <div class="w-full max-w-md p-6">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-pink-500">
                Tic Tac Toe
            </h1>
            <button id="themeToggle" class="p-2 rounded-lg transition-colors" title="Toggle theme">
                <span id="themeIcon">🌙</span>
            </button>
        </div>
        <div class="text-center mb-8">
            <p id="status" class="text-slate-400 dark:text-slate-600 text-lg">Player <span class="text-blue-400 dark:text-blue-600 font-bold">X</span>'s turn</p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="status-card p-3 rounded-xl text-center">
                <p class="text-xs uppercase tracking-widest text-slate-500 dark:text-slate-600">Player X</p>
                <p id="score-x" class="text-2xl font-bold text-blue-400 dark:text-blue-600">0</p>
            </div>
            <div class="status-card p-3 rounded-xl text-center">
                <p class="text-xs uppercase tracking-widest text-slate-500 dark:text-slate-600">Player O</p>
                <p id="score-o" class="text-2xl font-bold text-pink-400 dark:text-pink-600">0</p>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-8" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="flex flex-col gap-3">
            <button id="resetBtn" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl transition-all shadow-lg shadow-indigo-500/20 active:scale-95">
                New Round
            </button>
            <button id="clearScores" class="w-full py-2 text-slate-500 hover:text-slate-300 dark:text-slate-500 dark:hover:text-slate-700 text-sm transition-colors">
                Reset Scoreboard
            </button>
        </div>
    </div>

    <!-- Custom Modal for Game Over -->
    <div id="modal" class="fixed inset-0 bg-slate-950/80 dark:bg-slate-100/30 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50 transition-colors">
        <div class="bg-slate-900 dark:bg-slate-100 border border-slate-800 dark:border-slate-300 p-8 rounded-2xl max-w-xs w-full text-center shadow-2xl">
            <h2 id="modal-title" class="text-3xl font-bold mb-4">Winner!</h2>
            <p id="modal-msg" class="text-slate-400 dark:text-slate-700 mb-6 text-lg"></p>
            <button id="modalBtn" class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 dark:bg-indigo-600 dark:hover:bg-indigo-500 text-white font-bold rounded-lg transition-all">
                Play Again
            </button>
        </div>
    </div>

    <script src="tic-tac-toe-v2.js"></script>
</body>
</html>
