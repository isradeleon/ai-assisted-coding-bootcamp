<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="title">Neon Tic-Tac-Toe</h1>
            <div class="turn-indicator">
                <span id="x-turn" class="active">X's Turn</span>
                <span id="o-turn">O's Turn</span>
            </div>
        </header>

        <main>
            <div class="board" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
        </main>

        <footer>
            <button id="reset-btn" class="reset-btn">Reset Board</button>
            <div class="scores">
                <div class="score">Player X: <span id="score-x">0</span></div>
                <div class="score">Player O: <span id="score-o">0</span></div>
            </div>
        </footer>

        <div id="win-overlay" class="overlay hidden">
            <div class="overlay-content">
                <h2 id="win-message">X Wins!</h2>
                <button id="play-again-btn" class="reset-btn glow">Play Again</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
